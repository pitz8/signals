name: Signal Cron Jobs

on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 min → scanner
    - cron: '*/5 * * * *'   # every 5 min  → monitor
  workflow_dispatch:

jobs:
  scanner:
    if: github.event.schedule == '*/15 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scanner
        run: curl -sf "https://signals-ashy.vercel.app/api/scanner" || true

  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monitor
        run: curl -sf "https://signals-ashy.vercel.app/api/monitor" || true
      - name: Trigger monitor S2
        run: curl -sf "https://signals-ashy.vercel.app/api/monitor2" || true

  scanner2:
    if: github.event.schedule == '*/15 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scanner S2
        run: curl -sf "https://signals-ashy.vercel.app/api/scanner2" || true
